<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Shri Nivas</title>
    <link rel="stylesheet" href="register.css">
    <form action="register.php" method="POST" enctype="multipart/form-data"></form>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 500px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; }
        button { margin-top: 15px; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <h2>Register Your Property</h2>
    <form action="submit_form.php" method="POST" enctype="multipart/form-data">
        <label>Full Name</label>
        <input type="text" name="full_name" required>
        
        <label>Phone Number</label>
        <input type="tel" name="phone" required pattern="[0-9]{10}" title="Enter a valid 10-digit phone number">
        
        <label>Email ID</label>
        <input type="email" name="email" required>
        
        <label>House Photos</label>
        <input type="file" name="house_photos[]" accept="image/*" multiple required>
        
        <label>House Address</label>
        <input type="text" name="address" required>
        
        <label>Price (INR)</label>
        <input type="number" name="price" required>
        
        <label>Aadhar Card (PDF/Image)</label>
        <input type="file" name="aadhar" accept=".pdf, image/*" required>
        
        <label>House BHK Size</label>
        <select name="bhk_size" required>
            <option value="1BHK">1 BHK</option>
            <option value="2BHK">2 BHK</option>
            <option value="3BHK">3 BHK</option>
            <option value="4BHK">4 BHK</option>
        </select>
        
        <button type="submit">Register</button>
    </form>
</body>
</html>
